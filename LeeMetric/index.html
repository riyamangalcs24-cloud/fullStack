<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>LeeMetric</h1>
        <div class="user-container">
            <p>Enter your username below</p>
            <input type="text" name="user-input" id="user-input" placeholder="Enter your UserName Here">
            <button id="search-btn">Search</button>
        </div>
        <div class="stats-container">
            <div class="progress">
                <div class="progress-item circle">
                    <div class="easy-progress">
                        <span id="easy-label"></span>
                        Easy
                    </div>
                </div>
                <div class="progress-item circle">
                    <div class="medium-progress">
                        <span id="medium-label"></span>
                        Medium
                    </div>
                </div>
                <div class="progress-item circle">
                    <div class="hard-progress">
                        <span id="hard-label"></span>
                        Hard
                    </div>
                </div>

           </div>
           <div class="card">
            <!-- directly populated -->
           </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
