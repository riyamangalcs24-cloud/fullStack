<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flexbox Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
}



header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#333;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
}


.logo{
    font-size:25px;
    font-weight:bold;
}



footer{
    height:50px;
    background:#333;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
}




.dashboard{

    padding-top:60px;

    min-height:calc(100vh - 110px);

    display:flex;
}




.sidebar{

    width:250px;
    background:#ddd;
    padding:20px;
}


.secondary{

    width:200px;
    background:#ddd;
    padding:20px;
}




.main{

    flex:1;
    padding:20px;
}




.cards{

    display:flex;

    flex-wrap:wrap;

    gap:20px;

}


.card{

    flex:1 1 200px;

    height:180px;

    background:#f4f4f4;

    border-radius:10px;

    box-shadow:0 0 10px gray;


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

}


.icon{

    font-size:40px;
}


.card h3{

    margin:10px;

}



@media(max-width:800px){

    .dashboard{

        flex-direction:column;

    }


    .sidebar,
    .secondary{

        width:100%;

    }

}


</style>

</head>


<body>


<header>

    <div class="logo">
        My Dashboard
    </div>

</header>



<div class="dashboard">



    <aside class="sidebar">

        <h2>Menu</h2>

        <p>Home</p>
        <p>Profile</p>
        <p>Settings</p>

    </aside>




    <main class="main">


        <h1>Dashboard</h1>


        <div class="cards">


            <div class="card">

                <div class="icon">📊</div>

                <h3>Analytics</h3>

                <p>View reports</p>

            </div>



            <div class="card">

                <div class="icon">👥</div>

                <h3>Users</h3>

                <p>Manage users</p>

            </div>



            <div class="card">

                <div class="icon">💰</div>

                <h3>Sales</h3>

                <p>Track revenue</p>

            </div>



            <div class="card">

                <div class="icon">📦</div>

                <h3>Orders</h3>

                <p>Manage orders</p>

            </div>



            <div class="card">

                <div class="icon">⚙️</div>

                <h3>Settings</h3>

                <p>System settings</p>

            </div>



            <div class="card">

                <div class="icon">📈</div>

                <h3>Growth</h3>

                <p>Business growth</p>

            </div>



        </div>


    </main>





    <aside class="secondary">

        <h2>Updates</h2>

        <p>New messages</p>

        <p>Notifications</p>

    </aside>



</div>



<footer>

    Footer Section

</footer>



</body>
</html>
